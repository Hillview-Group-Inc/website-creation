<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Blog Management | Hillview Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/admin-blog.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              royal: "#5B2EFF",
              indigo: "#3D1E8C",
              navy: "#1F1B3A",
              accent: "#8B5CF6",
              dark: "#0F0F14",
              light: "#E5E7EB",
            },
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="text-white font-sans">
    <!-- Login Section -->
    <div
      id="login-section"
      class="min-h-screen flex items-center justify-center p-4"
    >
      <div class="admin-card w-full max-w-md p-8 rounded-2xl">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold mb-2">
            <span class="text-royal">Admin</span> Portal
          </h1>
          <p class="text-light text-sm">Blog Management System</p>
        </div>
        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-2">Username</label>
            <input
              type="text"
              id="username"
              required
              class="form-input w-full px-4 py-3 rounded-xl"
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input
              type="password"
              id="password"
              required
              class="form-input w-full px-4 py-3 rounded-xl"
            />
          </div>
          <button
            type="submit"
            class="btn-primary w-full py-3 rounded-xl font-semibold"
          >
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
          <p
            id="login-error"
            class="text-red-400 text-sm text-center hidden"
          ></p>
        </form>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard-section" class="hidden min-h-screen">
      <!-- Header -->
      <header class="admin-card border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
              <i class="fas fa-shield-alt text-royal text-xl"></i>
              <span class="font-bold text-lg">Blog Admin</span>
            </div>
            <div class="flex items-center gap-4">
              <span
                id="user-display"
                class="text-light text-sm hidden md:block"
              ></span>
              <button
                onclick="logout()"
                class="text-light hover:text-white transition-colors"
              >
                <i class="fas fa-sign-out-alt mr-1"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs -->
        <div class="flex gap-8 border-b border-white/10 mb-8">
          <button
            onclick="showTab('articles')"
            id="tab-articles"
            class="tab-btn pb-4 font-medium tab-active"
          >
            All Articles
          </button>
          <button
            onclick="showTab('new')"
            id="tab-new"
            class="tab-btn pb-4 font-medium text-light hover:text-white"
          >
            <i class="fas fa-plus mr-2"></i>New Article
          </button>
        </div>

        <!-- Articles List Tab -->
        <div id="content-articles" class="tab-content">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Manage Articles</h2>
            <button
              onclick="showTab('new')"
              class="btn-primary px-6 py-2 rounded-lg text-sm"
            >
              <i class="fas fa-plus mr-2"></i>Add New
            </button>
          </div>

          <div
            id="articles-list"
            class="admin-card rounded-2xl overflow-hidden"
          >
            <div class="p-4 text-center text-light">
              <i class="fas fa-spinner fa-spin mr-2"></i> Loading articles...
            </div>
          </div>
        </div>

        <!-- New/Edit Article Tab -->
        <div id="content-new" class="tab-content hidden">
          <div class="max-w-3xl mx-auto">
            <h2 id="form-title" class="text-2xl font-bold mb-6">
              Create New Article
            </h2>
            <form
              id="article-form"
              class="admin-card p-8 rounded-2xl space-y-6"
            >
              <input type="hidden" id="article-id" />

              <div class="grid md:grid-cols-2 gap-6">
                <div>
                  <label class="block text-sm font-medium mb-2"
                    >Title <span class="text-red-400">*</span></label
                  >
                  <input
                    type="text"
                    id="article-title"
                    required
                    class="form-input w-full px-4 py-3 rounded-xl"
                    placeholder="Article title"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2"
                    >Author <span class="text-red-400">*</span></label
                  >
                  <input
                    type="text"
                    id="article-author"
                    required
                    class="form-input w-full px-4 py-3 rounded-xl"
                    placeholder="Author name"
                  />
                </div>
              </div>

              <div class="grid md:grid-cols-2 gap-6">
                <div>
                  <label class="block text-sm font-medium mb-2"
                    >Category <span class="text-red-400">*</span></label
                  >
                  <select
                    id="article-category"
                    required
                    class="form-input w-full px-4 py-3 rounded-xl"
                  >
                    <option value="">Select category...</option>
                    <option value="tips">Tips & Tricks</option>
                    <option value="growth">Growth Strategy</option>
                    <option value="wellness">Health & Wellness</option>
                    <option value="seasonal">Seasonal</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2"
                    >Icon <span class="text-red-400">*</span></label
                  >
                  <select
                    id="article-icon"
                    required
                    class="form-input w-full px-4 py-3 rounded-xl"
                  >
                    <option value="fa-lightbulb">Lightbulb (Tips)</option>
                    <option value="fa-chart-line">Chart (Growth)</option>
                    <option value="fa-heart">Heart (Wellness)</option>
                    <option value="fa-calendar-alt">Calendar (Seasonal)</option>
                    <option value="fa-star">Star</option>
                    <option value="fa-tools">Tools</option>
                    <option value="fa-mobile-alt">Mobile</option>
                    <option value="fa-search">Search</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium mb-2"
                  >Excerpt <span class="text-red-400">*</span></label
                >
                <textarea
                  id="article-excerpt"
                  required
                  rows="3"
                  class="form-input w-full px-4 py-3 rounded-xl resize-none"
                  placeholder="Brief summary (shown in card preview)..."
                ></textarea>
                <p class="text-light text-xs mt-1">
                  Maximum 200 characters recommended
                </p>
              </div>

              <div>
                <label class="block text-sm font-medium mb-2"
                  >Full Content <span class="text-red-400">*</span></label
                >
                <textarea
                  id="article-content"
                  required
                  rows="10"
                  class="form-input w-full px-4 py-3 rounded-xl resize-none"
                  placeholder="Full article content..."
                ></textarea>
              </div>

              <div class="flex gap-4 pt-4">
                <button
                  type="submit"
                  class="btn-primary flex-1 py-3 rounded-xl font-semibold"
                >
                  <i class="fas fa-save mr-2"></i>Save Article
                </button>
                <button
                  type="button"
                  onclick="showTab('articles')"
                  class="px-6 py-3 rounded-xl border border-white/20 hover:bg-white/10 transition-colors"
                >
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script>
      const API_BASE_URL = "http://localhost:3000/api";
      let currentUser = null;

      // Check session on load
      window.addEventListener("load", async () => {
        await checkSession();
      });

      async function checkSession() {
        try {
          const response = await fetch(`${API_BASE_URL}/auth/check`, {
            credentials: "include",
          });

          if (response.ok) {
            const data = await response.json();
            currentUser = data.user;
            showDashboard();
          } else {
            showLogin();
          }
        } catch (error) {
          showLogin();
        }
      }

      function showLogin() {
        document.getElementById("login-section").classList.remove("hidden");
        document.getElementById("dashboard-section").classList.add("hidden");
      }

      function showDashboard() {
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("dashboard-section").classList.remove("hidden");
        document.getElementById("user-display").textContent =
          `Logged in as: ${currentUser?.username || "Admin"}`;
        loadArticles();
      }

      // Login form
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (response.ok && data.success) {
              currentUser = data.user;
              showDashboard();
            } else {
              const errorEl = document.getElementById("login-error");
              errorEl.textContent = data.message || "Invalid credentials";
              errorEl.classList.remove("hidden");
            }
          } catch (error) {
            console.error("Login error:", error);
          }
        });

      async function logout() {
        try {
          await fetch(`${API_BASE_URL}/auth/logout`, {
            method: "POST",
            credentials: "include",
          });
          currentUser = null;
          showLogin();
        } catch (error) {
          console.error("Logout error:", error);
        }
      }

      // Tab switching
      function showTab(tab) {
        // Hide all tabs
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.add("hidden"));
        document.querySelectorAll(".tab-btn").forEach((t) => {
          t.classList.remove("tab-active");
          t.classList.add("text-light");
        });

        // Show selected tab
        document.getElementById(`content-${tab}`).classList.remove("hidden");
        document.getElementById(`tab-${tab}`).classList.add("tab-active");
        document.getElementById(`tab-${tab}`).classList.remove("text-light");

        // Reset form if switching to new
        if (tab === "new") {
          resetForm();
        }
      }

      function resetForm() {
        document.getElementById("article-form").reset();
        document.getElementById("article-id").value = "";
        document.getElementById("form-title").textContent =
          "Create New Article";
      }

      // Load articles
      async function loadArticles() {
        try {
          const response = await fetch(`${API_BASE_URL}/blog`, {
            credentials: "include",
          });

          if (response.ok) {
            const data = await response.json();
            renderArticlesList(data.articles);
          }
        } catch (error) {
          console.error("Error loading articles:", error);
        }
      }

      function renderArticlesList(articles) {
        const container = document.getElementById("articles-list");

        if (articles.length === 0) {
          container.innerHTML = `
                    <div class="p-12 text-center text-light">
                        <i class="fas fa-inbox text-4xl mb-4 opacity-50"></i>
                        <p>No articles yet. Create your first article!</p>
                    </div>
                `;
          return;
        }

        container.innerHTML = `
                <table class="w-full">
                    <thead class="border-b border-white/10">
                        <tr>
                            <th class="text-left p-4 text-sm font-medium text-light">Article</th>
                            <th class="text-left p-4 text-sm font-medium text-light">Category</th>
                            <th class="text-left p-4 text-sm font-medium text-light">Date</th>
                            <th class="text-right p-4 text-sm font-medium text-light">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${articles
                          .map(
                            (article) => `
                            <tr class="article-row border-b border-white/5">
                                <td class="p-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-royal/20 flex items-center justify-center">
                                            <i class="fas ${article.icon} text-accent"></i>
                                        </div>
                                        <div>
                                            <p class="font-medium">${article.title}</p>
                                            <p class="text-xs text-light">${article.author}</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="p-4">
                                    <span class="px-3 py-1 rounded-full text-xs font-medium bg-royal/20 text-accent capitalize">
                                        ${article.category}
                                    </span>
                                </td>
                                <td class="p-4 text-light text-sm">
                                    ${new Date(article.createdAt).toLocaleDateString()}
                                </td>
                                <td class="p-4 text-right">
                                    <button onclick="editArticle(${article.id})" class="text-accent hover:text-white mr-3 transition-colors">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteArticle(${article.id})" class="text-red-400 hover:text-red-300 transition-colors">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        `,
                          )
                          .join("")}
                    </tbody>
                </table>
            `;
      }

      // Article form submission
      document
        .getElementById("article-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const id = document.getElementById("article-id").value;
          const articleData = {
            title: document.getElementById("article-title").value,
            author: document.getElementById("article-author").value,
            category: document.getElementById("article-category").value,
            icon: document.getElementById("article-icon").value,
            excerpt: document.getElementById("article-excerpt").value,
            content: document.getElementById("article-content").value,
          };

          try {
            const url = id
              ? `${API_BASE_URL}/blog/${id}`
              : `${API_BASE_URL}/blog`;
            const method = id ? "PUT" : "POST";

            const response = await fetch(url, {
              method,
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify(articleData),
            });

            if (response.ok) {
              showTab("articles");
              loadArticles();
            } else {
              alert("Failed to save article. Please try again.");
            }
          } catch (error) {
            console.error("Error saving article:", error);
            alert("Error saving article. Please check your connection.");
          }
        });

      async function editArticle(id) {
        const article = await fetch(`${API_BASE_URL}/blog/${id}`, {
          credentials: "include",
        })
          .then((r) => r.json())
          .then((d) => d.article);

        if (!article) return;

        document.getElementById("article-id").value = article.id;
        document.getElementById("article-title").value = article.title;
        document.getElementById("article-author").value = article.author;
        document.getElementById("article-category").value = article.category;
        document.getElementById("article-icon").value = article.icon;
        document.getElementById("article-excerpt").value = article.excerpt;
        document.getElementById("article-content").value = article.content;

        document.getElementById("form-title").textContent = "Edit Article";
        showTab("new");
      }

      async function deleteArticle(id) {
        if (
          !confirm(
            "Are you sure you want to delete this article? This action cannot be undone.",
          )
        ) {
          return;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/blog/${id}`, {
            method: "DELETE",
            credentials: "include",
          });

          if (response.ok) {
            loadArticles();
          } else {
            alert("Failed to delete article.");
          }
        } catch (error) {
          console.error("Error deleting article:", error);
        }
      }
    </script>
  </body>
</html>
